version: 2.1
jobs:
  build:
    docker:
      - image: cimg/php:7.4.30-node
    steps:
      - run:
          name: php test
          command: php artisan test
  deploy:
    docker:
      - image: cimg/php:7.4.30-node
    steps:
      - add_ssh_keys
      - run:
          name: deploy
          command: |
            ssh -o StrictHostKeyChecking=no -t webapp@${HOST_NAME} "cd catchApp && \
              git pull origin master && \
              composer install -n --no-dev --prefer-dist && \
              php artisan migrate --force && \
              php artisan config:cache"

workflows:
  version: 2
  build_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only:
                - master